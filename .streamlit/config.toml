# Trading-desk theme for the Turtle backtester.
# Teal accent (ATR / ocean), cool slate surfaces, monospace metrics.

[theme]
base = "dark"
baseFontSize = 15
baseFontWeight = 400
showSidebarBorder = true

chartCategoricalColors = [
    "#2DD4BF", "#38BDF8", "#FBBF24", "#FB7185",
    "#A3E635", "#818CF8", "#94A3B8", "#F97316",
]
chartSequentialColors = [
    "#042F2E", "#0F766E", "#14B8A6", "#5EEAD4", "#99F6E4",
    "#CCFBF1", "#F0FDFA",
]

[theme.dark]
primaryColor = "#2DD4BF"
backgroundColor = "#0B1219"
secondaryBackgroundColor = "#141C27"
codeBackgroundColor = "#1A2433"
textColor = "#E8EEF4"
linkColor = "#5EEAD4"
borderColor = "#243044"
codeTextColor = "#94A3B8"
showWidgetBorder = true
baseRadius = "8px"
buttonRadius = "8px"

font = "'Source Sans 3':https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap"
headingFont = "'Sora':https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&display=swap"
codeFont = "'IBM Plex Mono':https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
codeFontSize = "13px"
headingFontSizes = ["2rem", "1.5rem", "1.25rem", "1.1rem", "1rem", "0.875rem"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false

greenColor = "#34D399"
redColor = "#FB7185"
yellowColor = "#FBBF24"
orangeColor = "#FB923C"
blueColor = "#38BDF8"
violetColor = "#A78BFA"
grayColor = "#94A3B8"

dataframeBorderColor = "#243044"
dataframeHeaderBackgroundColor = "#1A2433"

[theme.dark.sidebar]
backgroundColor = "#0B1219"
secondaryBackgroundColor = "#141C27"
codeBackgroundColor = "#1A2433"
textColor = "#E8EEF4"
borderColor = "#243044"
primaryColor = "#2DD4BF"

[theme.light]
primaryColor = "#0F766E"
backgroundColor = "#F3F5F8"
secondaryBackgroundColor = "#FFFFFF"
codeBackgroundColor = "#E8ECF1"
textColor = "#0B1219"
linkColor = "#0F766E"
borderColor = "#D0D7E2"
codeTextColor = "#475569"
showWidgetBorder = true
baseRadius = "8px"
buttonRadius = "8px"

font = "'Source Sans 3':https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap"
headingFont = "'Sora':https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&display=swap"
codeFont = "'IBM Plex Mono':https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
codeFontSize = "13px"
headingFontSizes = ["2rem", "1.5rem", "1.25rem", "1.1rem", "1rem", "0.875rem"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false

greenColor = "#059669"
redColor = "#E11D48"
yellowColor = "#D97706"
orangeColor = "#EA580C"
blueColor = "#0284C7"
violetColor = "#7C3AED"
grayColor = "#64748B"

dataframeBorderColor = "#D0D7E2"
dataframeHeaderBackgroundColor = "#E8ECF1"

[theme.light.sidebar]
backgroundColor = "#EEF1F5"
secondaryBackgroundColor = "#FFFFFF"
codeBackgroundColor = "#E8ECF1"
textColor = "#0B1219"
borderColor = "#D0D7E2"
primaryColor = "#0F766E"
